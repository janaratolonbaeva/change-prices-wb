    <title>Редактор цен и количества</title>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="header">
      <h1 class="header__title">Редактор Excel</h1>
      <p class="header__subtitle">Обновление цен и количества товаров</p>
    </header>

    <main class="container">
      <section class="card">
        <h2 class="card__title">Изменить цену товара</h2>
        <form id="form" class="form">
          <div class="form__row">
            <select id="select" class="select">
              <option value="+">+ Прибавить</option>
              <option value="-">− Отнять</option>
            </select>
            <input
              type="number"
              id="number"
              class="input"
              placeholder="Число"
              step="1"
              min="0"
            />
          </div>
          <div class="form__field">
            <label class="file-label">
              <input
                type="file"
                id="fileInput"
                class="file-input"
                accept=".xlsx,.xls"
              />
              <span class="file-label__text">Выбрать файл Excel</span>
            </label>
          </div>
          <div id="status1" class="status" aria-live="polite"></div>
          <div class="form__actions">
            <button type="button" id="calculateButton" class="btn btn--primary">
              Рассчитать
            </button>
            <button
              type="button"
              id="downloadButton"
              class="btn btn--secondary"
            >
              Скачать файл с новыми ценами
            </button>
          </div>
        </form>
      </section>

      <section class="card">
        <h2 class="card__title">Поменять количество товара</h2>
        <form id="form2" class="form">
          <div class="form__row">
            <select id="select2" class="select">
              <option value="+">+ Прибавить</option>
              <option value="-">− Отнять</option>
            </select>
            <input
              type="number"
              id="number2"
              class="input"
              placeholder="Число"
              step="1"
              min="0"
            />
          </div>
          <div class="form__field">
            <label class="file-label">
              <input
                type="file"
                id="fileInput2"
                class="file-input"
                accept=".xlsx,.xls"
              />
              <span class="file-label__text">Выбрать файл Excel</span>
            </label>
          </div>
          <div id="status2" class="status" aria-live="polite"></div>
          <div class="form__actions">
            <button
              type="button"
              id="calculateButton2"
              class="btn btn--primary"
            >
              Рассчитать
            </button>
            <button
              type="button"
              id="downloadButton2"
              class="btn btn--secondary"
            >
              Скачать файл с новым количеством
            </button>
          </div>
        </form>
      </section>
    </main>

    <script src="new-prices.js"></script>
  </body>
</html>
